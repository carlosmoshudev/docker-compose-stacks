version: 2

updates:
  # ============================================================
  # GitHub Actions
  # ============================================================
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "CHORE(github)"
    labels:
      - "type:chore"
      - "area:github"
      - "dependencies"

  # ============================================================
  # Docker Compose stacks
  # ------------------------------------------------------------
  # Añadir aquí las carpetas que contienen compose.yaml.
  # ============================================================
  - package-ecosystem: "docker-compose"
    directories:
      - "/automation"
      - "/dashboard"
      - "/docker"
      - "/home"
      - "/library"
      - "/media"
      - "/network"
      - "/productivity"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:30"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "CHORE(deps)"
    labels:
      - "type:chore"
      - "area:docker"
      - "dependencies"
      - "risk:needs-review"
    groups:
      docker-compose-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
